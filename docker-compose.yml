services:
  db:
    image: postgres:16-alpine
    container_name: nexo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexo
      POSTGRES_PASSWORD: nexo_local_dev
      POSTGRES_DB: nexo
    ports:
      - "5433:5432"
    volumes:
      - nexo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexo -d nexo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nexo_pgdata:
